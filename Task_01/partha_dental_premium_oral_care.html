                                        <span className="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">location_on</span>
                                    </div>
                                </div>
                            </div>

                            <button 
                                onClick={handleConfirm}
                                className={`w-full h-14 ${status === 'confirmed' ? 'bg-tertiary' : 'bg-primary-container'} text-white font-bold rounded-full shadow-lg active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2`}
                            >
                                {status === 'idle' && 'Confirm Appointment'}
                                {status === 'loading' && (
                                    <span className="flex items-center gap-2">
                                        <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 
                                        Scheduling...
                                    </span>
                                )}
                                {status === 'confirmed' && (
                                    <span className="flex items-center gap-2">
                                        <span className="material-symbols-outlined">check_circle</span> 
                                        Confirmed!
                                    </span>
                                )}
                            </button>
                        </div>
                    </section>

                    <section className="px-margin-mobile mb-12">
                        <h3 className="font-epilogue text-[24px] font-bold text-on-background mb-4 px-1">Need Help?</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-surface-container p-5 rounded-[20px] flex flex-col gap-3">
                                <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center text-primary">
                                    <span className="material-symbols-outlined">call</span>
                                </div>
                                <div>
                                    <span className="font-bold text-sm block">Call Us</span>
                                    <span className="text-[10px] text-on-surface-variant">Immediate Help</span>
                                </div>
                            </div>
                            <div className="bg-[#E7F3EF] p-5 rounded-[20px] flex flex-col gap-3">
                                <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center text-tertiary">
                                    <span className="material-symbols-outlined" style={{fontVariationSettings: "'FILL' 1"}}>chat</span>
                                </div>
                                <div>
                                    <span className="font-bold text-sm block">WhatsApp</span>
                                    <span className="text-[10px] text-on-surface-variant">Chat with Us</span>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const App = () => {
            const { pathname } = useLocation();

            // Scroll to top on route change
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [pathname]);

            return (
                <div className="min-h-screen">
                    <Header />
                    <Routes>
                        <Route path="/" element={<HomePage />} />
                        <Route path="/implants" element={<ImplantsPage />} />
                        <Route path="/booking" element={<BookingPage />} />
                    </Routes>
                    <Footer />
                    <BottomNav />
                </div>
            );
        };

        const rootElement = document.getElementById("root");
        const root = createRoot(rootElement);
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>
</html>
